# ~/.cache/tmux/tmux.conf

# ─── Prefix ───────────────────────────────────────────────────────────────────
# Remap C-b → C-a. Closer to home row, frees C-b for readline (back-char) in shells.
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # press C-a twice to send a literal C-a to the inner program

# ─── Responsiveness ───────────────────────────────────────────────────────────
# Kill the 500ms delay tmux waits to disambiguate escape sequences.
# Without this, vim/nvim feels laggy inside tmux (ESC → normal mode is delayed).
set -sg escape-time 0

# ─── Copy mode (vi) ───────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
# Adjust the pipe target per OS: pbcopy (macOS), xclip -selection clipboard (X11),
# wl-copy (Wayland). Keeping pbcopy here since the host is macOS-ish; swap as needed.
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'
# Default MouseDragEnd1Pane runs copy-pipe-and-cancel, which exits copy-mode and
# snaps the viewport back to the live tail. Drop the -and-cancel so a mouse
# highlight keeps the selection and the scrollback position. Press q/Escape to
# leave copy-mode when you actually want to return to the bottom.
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear

# ─── Splits ───────────────────────────────────────────────────────────────────
# | and - are mnemonic for the resulting split orientation.
# -c "#{pane_current_path}" makes new panes inherit CWD instead of $HOME.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── Pane navigation ──────────────────────────────────────────────────────────
# Smart pane switching with awareness of vim/nvim splits.
# Pairs with christoomey/vim-tmux-navigator in the LazyVim installer.
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ─── Mouse ────────────────────────────────────────────────────────────────────
# Scroll, resize, click-to-focus. Keyboard still drives everything else.
set -g mouse on

# ─── Scrollback & color ───────────────────────────────────────────────────────
set -g history-limit 100000
set -g default-terminal "tmux-256color"
# Tc capability = 24-bit truecolor. Required for modern colorschemes in vim/nvim.
set -ga terminal-overrides ",*256col*:Tc"

# ─── Reload ───────────────────────────────────────────────────────────────────
bind r source-file -q ~/.cache/tmux/tmux.conf ; display "reloaded"

# ─── Status bar / active window highlight ─────────────────────────────────────
# Make the active window in the status bar pop. Default tmux just reverses
# colors which is easy to miss on a busy bar.
set -g status-style "bg=colour234,fg=colour245"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour231,bg=colour129,bold] #I:#W #[default]"
setw -g window-status-current-style "fg=colour231,bg=colour129,bold"
setw -g window-status-style "fg=colour245,bg=colour234"
# Bright border on the active pane so it's obvious which pane has focus too.
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour129,bold"

# ─── Vim extras ───────────────────────────────────────────────────────────────
# Forward terminal focus events into the pane. vim/nvim needs this for
# :set autoread to fire and for FocusGained/FocusLost autocmds (gitgutter,
# lualine clock, etc.) to update when you switch panes/windows.
set -g focus-events on
# Pass through undercurl + underline-color escape sequences so LSP diagnostics
# in nvim render as colored squiggles instead of plain underlines.
set -as terminal-features ",*:usstyle"
